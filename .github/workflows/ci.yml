name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = 北京时间凌晨 2:00

jobs:

  # ─── 后端测试 ──────────────────────────────
  backend-test:
    name: 后端单元测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 安装依赖
        working-directory: backend
        run: npm ci

      - name: TypeScript 编译检查
        working-directory: backend
        run: npx tsc --noEmit

      - name: 运行单元测试
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/test
          JWT_SECRET: ci-test-secret-key-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          OPENAI_BASE_URL: mock
          OPENAI_API_KEY: mock
          RESEND_API_KEY: mock

  # ─── 前端构建检查 ──────────────────────────
  frontend-build:
    name: 前端构建验证
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        working-directory: frontend
        run: npm ci

      - name: TypeScript 编译检查
        working-directory: frontend
        run: npx tsc --noEmit

      - name: 构建前端
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:4000
